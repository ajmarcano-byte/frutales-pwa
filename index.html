<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#2D5016">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Frutales">
<title>Frutales</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;background:#f4f6f0;color:#1a1a1a}
button,select,input{font-family:inherit;font-size:inherit}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:#f4f6f0;position:relative}
#topbar{background:#2D5016;color:#fff;padding:env(safe-area-inset-top,12px) 16px 10px;flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between;min-height:56px}
#topbar .ttl{font-size:16px;font-weight:600}
#topbar .sub{font-size:11px;color:#9FE1CB;margin-top:1px}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:72px}
#tabbar{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #e0e0d8;padding:6px 0 calc(6px + env(safe-area-inset-bottom,0px));display:flex}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 0}
.tab-icon{font-size:20px}
.tab-label{font-size:10px;color:#888}
.tab-item.active .tab-label{color:#2D5016;font-weight:600}
.card{background:#fff;margin:0 12px 8px;border-radius:12px;border:0.5px solid #e0e0d8;overflow:hidden}
.card-hdr{padding:10px 12px;display:flex;align-items:center;gap:8px}
.card-name{font-size:13px;font-weight:600;color:#2D5016;flex:1}
.card-badge{font-size:10px;padding:2px 6px;border-radius:6px;background:#EAF3DE;color:#27500A}
.card-badge.alert{background:#FADBD8;color:#712B13}
.pbar{height:3px;background:#e8e8e0}
.pfill{height:3px;background:#639922;transition:width .3s}
.card-body{padding:4px 10px 10px}
.task-row{display:flex;align-items:center;gap:8px;padding:7px 2px;border-bottom:0.5px solid #f4f4ee;-webkit-user-select:none}
.task-row:last-child{border-bottom:none}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid #c0c0b8;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer}
.chk.done{background:#639922;border-color:#639922}
.chk-tick{font-size:11px;color:#fff;display:none;font-weight:700}
.chk.done .chk-tick{display:block}
.task-info{flex:1;min-width:0}
.task-name{font-size:12px;line-height:1.3}
.task-name.done{text-decoration:line-through;color:#bbb}
.task-sub{font-size:10px;color:#888;margin-top:1px}
.task-actions{display:flex;gap:4px;flex-shrink:0}
.act-btn{font-size:9px;padding:3px 6px;border-radius:6px;border:0.5px solid #e0e0d8;background:#f9f9f6;color:#555;cursor:pointer}
.act-btn.rain{background:#EBF5FB;color:#1A5276;border-color:#AED6F1}
.tb-r{font-size:9px;padding:2px 5px;border-radius:5px;background:#D6EAF8;color:#0C447C}
.tb-a{font-size:9px;padding:2px 5px;border-radius:5px;background:#EAF3DE;color:#27500A}
.tb-t{font-size:9px;padding:2px 5px;border-radius:5px;background:#FADBD8;color:#712B13}
.tb-v{font-size:9px;padding:2px 5px;border-radius:5px;background:#F1EFE8;color:#5F5E5A}
.tb-h{font-size:9px;padding:2px 5px;border-radius:5px;background:#FAEEDA;color:#633806}
.summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:8px 12px}
.stat-card{background:#fff;border-radius:8px;border:0.5px solid #e0e0d8;padding:8px 6px;text-align:center}
.stat-n{font-size:18px;font-weight:600;color:#2D5016}
.stat-l{font-size:9px;color:#888;margin-top:1px}
.pill-row{display:flex;gap:6px;flex-wrap:wrap;padding:8px 12px 4px}
.pill{font-size:10px;padding:3px 9px;border-radius:10px;font-weight:500}
.p-b{background:#D6EAF8;color:#0C447C}
.p-g{background:#EAF3DE;color:#27500A}
.p-r{background:#FADBD8;color:#712B13}
.p-sky{background:#EBF5FB;color:#1A5276}
.alert-bar{background:#FFF3CD;margin:4px 12px 4px;border-radius:8px;padding:7px 10px;font-size:11px;color:#633806;border:0.5px solid #F9C74F;display:flex;gap:6px}
.sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#888;padding:8px 14px 3px}
.hist-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:0.5px solid #f0f0e8;background:#fff}
.hist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hist-info{flex:1}
.hist-name{font-size:12px;font-weight:500;color:#2D5016}
.hist-task{font-size:11px;color:#555}
.hist-date{font-size:10px;color:#aaa}
.form-wrap{padding:12px}
.form-card{background:#fff;border-radius:12px;border:0.5px solid #e0e0d8;padding:14px}
.frow{margin-bottom:10px}
.frow-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.flbl{font-size:10px;color:#888;margin-bottom:3px;display:block}
.finput,.fsel{width:100%;padding:8px 10px;font-size:12px;border-radius:8px;border:0.5px solid #ddd;background:#f9f9f6;color:#1a1a1a;-webkit-appearance:none}
.finput:focus,.fsel:focus{outline:none;border-color:#639922}
.radio-row{display:flex;gap:12px;margin-top:4px}
.radio-row label{display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer}
.calc-box{background:#EAF3DE;border-radius:8px;padding:10px 12px;margin:10px 0;border:0.5px solid #C0DD97}
.calc-title{font-size:10px;color:#27500A;font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.calc-row{font-size:11px;color:#3B6D11;margin-bottom:3px;line-height:1.4}
.compat-box{border-radius:8px;padding:8px 10px;margin:6px 0;font-size:10px}
.compat-ok{background:#EAF3DE;color:#27500A;border:0.5px solid #C0DD97}
.compat-no{background:#FADBD8;color:#712B13;border:0.5px solid #F5C4B3}
.save-btn{width:100%;padding:12px;background:#2D5016;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end}
.modal-box{background:#fff;border-radius:20px 20px 0 0;width:100%;padding:16px 16px 24px;max-height:85vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-title{font-size:14px;font-weight:600;color:#2D5016}
.modal-close{font-size:22px;color:#aaa;cursor:pointer;background:none;border:none;line-height:1}
.detail-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid #f0f0e8;font-size:12px}
.detail-row:last-child{border-bottom:none}
.detail-lbl{color:#888;margin-right:8px;flex-shrink:0}
.detail-val{color:#1a1a1a;font-weight:500;text-align:right;font-size:11px;line-height:1.4}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-btns button{flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none}
.mbtn-sec{background:#f4f4ee;color:#555}
.mbtn-pri{background:#2D5016;color:#fff}
.mbtn-rain{background:#EBF5FB;color:#1A5276}
.mbtn-del{background:#FADBD8;color:#712B13}
.fab{position:absolute;bottom:80px;right:16px;width:44px;height:44px;border-radius:50%;background:#639922;border:none;color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10}
#toast{position:absolute;bottom:84px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1a1a;color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;opacity:0;transition:all .25s;z-index:300;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#loading{position:absolute;inset:0;background:#f4f6f0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:200}
#loading .logo{font-size:56px}
#loading p{font-size:13px;color:#639922}
#loading.hidden{display:none}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#9FE1CB;flex-shrink:0;margin-top:4px}
.sync-dot.error{background:#F5C4B3}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-dot.syncing{animation:pulse 1s infinite}
.settings-card{background:#fff;margin:0 12px 10px;border-radius:12px;border:0.5px solid #e0e0d8;overflow:hidden}
.settings-hdr{padding:8px 14px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#888;background:#f9f9f6;border-bottom:0.5px solid #f0f0e8}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:0.5px solid #f0f0e8}
.settings-row:last-child{border-bottom:none}
.settings-lbl{font-size:13px}
.settings-sub{font-size:10px;color:#888;margin-top:1px}
.toggle{width:42px;height:24px;border-radius:12px;background:#ddd;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
.toggle.on{background:#639922}
.toggle-knob{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s}
.toggle.on .toggle-knob{left:20px}
.sselect{padding:5px 8px;font-size:12px;border-radius:7px;border:0.5px solid #ddd;background:#f9f9f6;color:#1a1a1a}
.link-btn{font-size:12px;color:#185FA5;background:none;border:none;cursor:pointer}
.conn-ok{font-size:11px;color:#639922;font-weight:500}
.conn-err{font-size:11px;color:#D85A30;font-weight:500}
</style>
</head>
<body>
<div id="app">
  <div id="loading"><div class="logo">🌳</div><p>Cargando frutales…</p></div>
  <div id="topbar">
    <div><div class="ttl" id="ttl">Frutales</div><div class="sub" id="sub"></div></div>
    <div style="display:flex;align-items:center;gap:8px"><div class="sync-dot" id="sdot"></div></div>
  </div>
  <div id="content"></div>
  <div id="tabbar">
    <div class="tab-item active" id="tab-hoy" onclick="go('hoy')"><span class="tab-icon">📅</span><span class="tab-label">Hoy</span></div>
    <div class="tab-item" id="tab-arboles" onclick="go('arboles')"><span class="tab-icon">🌳</span><span class="tab-label">Árboles</span></div>
    <div class="tab-item" id="tab-historial" onclick="go('historial')"><span class="tab-icon">📋</span><span class="tab-label">Historial</span></div>
    <div class="tab-item" id="tab-ajustes" onclick="go('ajustes')"><span class="tab-icon">⚙️</span><span class="tab-label">Ajustes</span></div>
  </div>
  <div id="mc"></div>
  <div id="toast"></div>
</div>
<script>
const API_URL = localStorage.getItem('api_url') || '';
const S = { tab:'hoy', arboles:[], tareas:[], historial:[], config:{ garrafa_litros:13, notif_riego:true, notif_hora:'08:00', notif_finde:true }, offline:false, lpt:null };
const C = { set:(k,v)=>{ try{localStorage.setItem('f_'+k,JSON.stringify(v))}catch(e){} }, get:(k,d)=>{ try{const v=localStorage.getItem('f_'+k);return v?JSON.parse(v):d}catch(e){return d} } };

function fmtFecha(iso){ if(!iso)return'—'; const d=new Date(iso); return d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'}); }
function fmtHora(iso){ if(!iso)return''; const d=new Date(iso); return d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}); }
function getEst(){ const m=new Date().getMonth()+1; return m>=3&&m<=5?'Primavera':m>=6&&m<=9?'Verano':m>=10&&m<=11?'Otoño':'Invierno'; }
function semISO(d){ const t=new Date(d); t.setHours(0,0,0,0); t.setDate(t.getDate()+3-(t.getDay()+6)%7); const y=new Date(t.getFullYear(),0,4); return 1+Math.round(((t-y)/86400000-3+(y.getDay()+6)%7)/7); }
function esSemana(iso){ const d=new Date(iso),h=new Date(); h.setHours(0,0,0,0); const l=new Date(h); l.setDate(h.getDate()-((h.getDay()+6)%7)); const dm=new Date(l); dm.setDate(l.getDate()+6); dm.setHours(23,59,59,999); return d>=l&&d<=dm; }
function garrStr(litros){ const g=Number(S.config.garrafa_litros)||13; const f=litros/g; const s=f<=0.15?'⅛':f<=0.3?'¼':f<=0.45?'⅓':f<=0.6?'½':f<=0.75?'⅔':f<=0.9?'¾':f<=1.1?'1':f<=1.6?'1½':'2'; return `${litros} L ≈ ${s} garrafa ${g}L`; }
function sync(st){ const d=document.getElementById('sdot'); if(d) d.className='sync-dot'+(st==='syncing'?' syncing':st==='error'?' error':''); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

async function api(action,params={}){
  if(!API_URL){ S.offline=true; return C.get(action+'_cache',{ok:false,error:'Sin URL'}); }
  sync('syncing');
  try{
    const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,...params})});
    const d=await r.json(); sync('ok'); S.offline=false;
    if(d.ok) C.set(action+'_cache',d);
    return d;
  }catch(e){ sync('error'); S.offline=true; return C.get(action+'_cache',{ok:false,error:'Sin conexión'}); }
}

async function init(){
  document.getElementById('loading').classList.remove('hidden');
  const cfg=await api('getConfig'); if(cfg.ok){S.config=cfg.config;C.set('config',cfg.config);}else S.config=C.get('config',{garrafa_litros:13});
  const arb=await api('getArboles'); if(arb.ok){S.arboles=arb.arboles;C.set('arboles',arb.arboles);}else S.arboles=C.get('arboles',[]);
  const tar=await api('getTareas',{}); if(tar.ok){S.tareas=tar.tareas;C.set('tareas',tar.tareas);}else S.tareas=C.get('tareas',[]);
  document.getElementById('loading').classList.add('hidden');
  go('hoy');
}

function go(tab){
  S.tab=tab;
  document.querySelectorAll('.tab-item').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('tab-'+tab); if(el) el.classList.add('active');
  ({hoy:rHoy,arboles:rArboles,historial:rHistorial,ajustes:rAjustes})[tab]();
}

function rHoy(){
  const now=new Date();
  const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const mes=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('ttl').textContent=`${dias[now.getDay()]} ${now.getDate()} ${mes[now.getMonth()]}`;
  document.getElementById('sub').textContent=`Sem ${semISO(now)} · ${getEst()}`;
  const ts=S.tareas.filter(t=>esSemana(t.fecha_prevista));
  const rC=ts.filter(t=>t.tipo==='riego').length, aC=ts.filter(t=>t.tipo==='abono'||t.tipo==='humus').length;
  const tC=ts.filter(t=>t.tipo==='tratamiento').length, lC=ts.filter(t=>t.saltada_lluvia).length;
  let html=`<div class="pill-row">`;
  if(rC) html+=`<span class="pill p-b">💧 ${rC} riego${rC>1?'s':''}</span>`;
  if(aC) html+=`<span class="pill p-g">🌱 ${aC} abono${aC>1?'s':''}</span>`;
  if(tC) html+=`<span class="pill p-r">⚗️ ${tC} trat.</span>`;
  if(lC) html+=`<span class="pill p-sky">☁️ ${lC} saltado${lC>1?'s':''}</span>`;
  html+=`</div>`;
  if(S.offline) html+=`<div class="alert-bar">📵 Sin conexión — datos en caché</div>`;
  const pm={}; S.arboles.forEach(a=>pm[a.id]=a);
  const pa={}; ts.forEach(t=>{ if(!pa[t.arbol_id]) pa[t.arbol_id]=[]; pa[t.arbol_id].push(t); });
  Object.entries(pa).forEach(([aid,tareas])=>{
    const a=pm[aid]; if(!a) return;
    const done=tareas.filter(t=>t.estado==='hecha').length, tot=tareas.length;
    const pct=tot>0?Math.round(done/tot*100):0;
    const alerta=tareas.some(t=>t.tipo==='tratamiento'&&t.estado==='pendiente');
    html+=`<div class="card"><div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      <div class="card-hdr"><span style="font-size:18px">${a.emoji||'🌳'}</span>
      <span class="card-name">${a.nombre}</span>
      <span class="card-badge ${alerta?'alert':''}">${alerta?'⚠️ trat.':a.tipo||''}</span>
      <span style="font-size:10px;color:#888">${done}/${tot}</span></div>
      <div class="card-body">`;
    tareas.forEach(t=>{
      const done=t.estado==='hecha', skip=t.estado==='saltada';
      const tb={'riego':'tb-r','abono':'tb-a','humus':'tb-h','tratamiento':'tb-t','revision':'tb-v'}[t.tipo]||'tb-v';
      const tl={'riego':'💧','abono':'🌱','humus':'🪱','tratamiento':'⚗️','revision':'🔍'}[t.tipo]||'';
      const sub=t.tipo==='riego'&&t.cantidad?garrStr(Number(t.cantidad)):fmtFecha(t.fecha_prevista);
      html+=`<div class="task-row" ontouchstart="slp(event,'${t.id}')" ontouchend="clp()" ontouchmove="clp()" onmousedown="slp(event,'${t.id}')" onmouseup="clp()" onmouseleave="clp()">
        <div class="chk ${done||skip?'done':''}" onclick="event.stopPropagation();chk('${t.id}')">
          <span class="chk-tick">${skip?'☁':'✓'}</span></div>
        <div class="task-info">
          <div class="task-name ${done||skip?'done':''}">${t.descripcion||''}</div>
          ${sub?`<div class="task-sub">${sub}</div>`:''}
        </div>
        <div class="task-actions">
          <span class="${tb}">${tl} ${t.tipo||''}</span>
          ${!done&&!skip?`<span class="act-btn rain" onclick="event.stopPropagation();skp('${t.id}')">☁️</span>
          <span class="act-btn" onclick="event.stopPropagation();aplM('${t.id}')">📅</span>`:''}
        </div></div>`;
    });
    html+=`</div></div>`;
  });
  if(!Object.keys(pa).length) html+=`<div style="text-align:center;padding:40px 20px;color:#888;font-size:13px"><div style="font-size:40px;margin-bottom:12px">🌱</div>Sin tareas esta semana.</div>`;
  document.getElementById('content').innerHTML=html;
}

function rArboles(){
  document.getElementById('ttl').textContent='Mis árboles';
  document.getElementById('sub').textContent=getEst()+' 2025';
  const tot=S.tareas.length, hec=S.tareas.filter(t=>t.estado==='hecha').length;
  const pct=tot>0?Math.round(hec/tot*100):0;
  let html=`<div class="summary-bar">
    <div class="stat-card"><div class="stat-n">${S.arboles.length}</div><div class="stat-l">árboles</div></div>
    <div class="stat-card"><div class="stat-n">${pct}%</div><div class="stat-l">completado</div></div>
    <div class="stat-card"><div class="stat-n">${hec}</div><div class="stat-l">hechas</div></div>
    <div class="stat-card"><div class="stat-n">${tot-hec}</div><div class="stat-l">pendientes</div></div>
  </div>`;
  const gnom={citrico:'🍊 Cítricos',tropical:'🥭 Tropicales',hueso:'🍑 Hueso',manzano:'🍎 Manzanos',otro:'🌳 Otros'};
  const gs={}; S.arboles.forEach(a=>{ const g=a.tipo||'otro'; if(!gs[g]) gs[g]=[]; gs[g].push(a); });
  Object.entries(gs).forEach(([g,arbs])=>{
    html+=`<div class="sec-lbl">${gnom[g]||g}</div><div class="card"><div class="card-body" style="padding:0">`;
    arbs.forEach((a,i)=>{
      const tar=S.tareas.filter(t=>t.arbol_id===a.id);
      const d=tar.filter(t=>t.estado==='hecha').length, p=tar.length>0?Math.round(d/tar.length*100):0;
      const bdr=i<arbs.length-1?'border-bottom:0.5px solid #f0f0e8':'';
      html+=`<div style="display:flex;align-items:center;padding:10px 12px;${bdr};cursor:pointer" onclick="eAM('${a.id}')">
        <span style="font-size:18px;margin-right:10px">${a.emoji||'🌳'}</span>
        <span style="font-size:13px;font-weight:600;flex:1;color:#2D5016">${a.nombre}</span>
        <div style="width:60px;height:4px;background:#e8e8e0;border-radius:2px;margin-right:8px">
          <div style="width:${p}%;height:4px;background:#639922;border-radius:2px"></div></div>
        <span style="font-size:10px;color:#888;min-width:28px;text-align:right">${p}%</span>
        <span style="font-size:13px;color:#aaa;margin-left:6px">›</span>
      </div>`;
    });
    html+=`</div></div>`;
  });

function rC(){
  const tipo=document.getElementById('nt')?.value||'citrico';
  const edad=Number(document.getElementById('ned')?.value)||1;
  const suelo=document.getElementById('ns')?.value||'franco';
  const g=Number(S.config.garrafa_litros)||13;
  let base={prim:[1.5,2],ver:[2,3],oto:[1.5,1],inv:[1,0.5]};
  if(tipo==='citrico') base=edad>=4?{prim:[2.5,2],ver:[3,3],oto:[2,1],inv:[1.5,0.4]}:{prim:[1.5,2],ver:[2,3],oto:[1.5,1],inv:[1,0.5]};
  else if(tipo==='tropical') base={prim:[1.5,2],ver:[2,3],oto:[1,1],inv:[0.5,0.5]};
  else if(tipo==='hueso') base={prim:[2,2],ver:[2.5,3],oto:[1.5,1],inv:[1,0.5]};
  else if(tipo==='manzano') base=edad>=3?{prim:[2,2],ver:[2.5,3],oto:[1.5,1],inv:[1,0.5]}:{prim:[1.5,2],ver:[2,3],oto:[1,1],inv:[1,0.5]};
  const f=suelo==='arcilloso'?0.85:suelo==='arenoso'?1.1:1;
  const m=new Date().getMonth()+1;
  const ek=m>=3&&m<=5?'prim':m>=6&&m<=9?'ver':m>=10&&m<=11?'oto':'inv';
  const l=Math.round(base[ek][0]*f*10)/10, fr=base[ek][1];
  const gs=(()=>{ const r=l/g; return r<=0.15?'⅛':r<=0.3?'¼':r<=0.45?'⅓':r<=0.6?'½':r<=0.75?'⅔':r<=0.9?'¾':r<=1.1?'1':r<=1.6?'1½':'2'; })();
  const ab={citrico:`🌱 Abono cítricos: ${edad>=4?'70':'35'} g · c/5–6 sem.<br>🪱 Humus: ${edad>=4?'2':'1'} kg · primavera`,tropical:'🌱 Abono: 25 g · c/5–6 sem.<br>🪱 Humus: 1 kg · primavera',hueso:'🌱 Abono frutales: 55–65 g · may+jun<br>🪱 Humus: 2 kg · primavera',manzano:`🌱 Abono frutales: ${edad>=2?'55':'45'} g · may+jun<br>🪱 Humus: 1 kg · primavera`}[tipo]||'';
  const el=document.getElementById('ncc');
  if(el) el.innerHTML=`💧 Riego: ${l} L ≈ ${gs} garrafa ${g}L · ${fr}×/sem<br>${ab}`;
}

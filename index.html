<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#2D5016">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Frutales">
<title>Frutales</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;background:#f4f6f0;color:#1a1a1a}
button,select,input{font-family:inherit;font-size:inherit}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:#f4f6f0;position:relative}
#topbar{background:#2D5016;color:#fff;padding:env(safe-area-inset-top,12px) 16px 10px;flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between;min-height:56px}
#topbar .title{font-size:16px;font-weight:600}
#topbar .sub{font-size:11px;color:#9FE1CB;margin-top:1px}
#topbar-actions{display:flex;gap:8px;align-items:center}
.icon-btn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:72px}
#tabbar{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #e0e0d8;padding:6px 0 calc(6px + env(safe-area-inset-bottom,0px));display:flex}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 0}
.tab-icon{font-size:20px}
.tab-label{font-size:10px;color:#888;font-weight:400}
.tab-item.active .tab-label{color:#2D5016;font-weight:600}

/* ── CARDS ── */
.card{background:#fff;margin:0 12px 8px;border-radius:12px;border:0.5px solid #e0e0d8;overflow:hidden}
.card-header{padding:10px 12px;display:flex;align-items:center;gap:8px;cursor:pointer}
.card-emoji{font-size:18px;flex-shrink:0}
.card-name{font-size:13px;font-weight:600;color:#2D5016;flex:1}
.card-badge{font-size:10px;padding:2px 6px;border-radius:6px;background:#EAF3DE;color:#27500A}
.card-badge.alert{background:#FADBD8;color:#712B13}
.card-badge.warn{background:#FAEEDA;color:#633806}
.card-progress-txt{font-size:10px;color:#888}
.pbar{height:3px;background:#e8e8e0}
.pfill{height:3px;background:#639922;transition:width .3s}
.card-body{padding:4px 10px 10px}

/* ── TAREAS ── */
.task-row{display:flex;align-items:center;gap:8px;padding:7px 2px;border-bottom:0.5px solid #f4f4ee;cursor:pointer;-webkit-user-select:none}
.task-row:last-child{border-bottom:none}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid #c0c0b8;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chk.done{background:#639922;border-color:#639922}
.chk-tick{font-size:11px;color:#fff;display:none;font-weight:700}
.chk.done .chk-tick{display:block}
.task-info{flex:1;min-width:0}
.task-name{font-size:12px;color:#1a1a1a;line-height:1.3}
.task-name.done{text-decoration:line-through;color:#bbb}
.task-sub{font-size:10px;color:#888;margin-top:1px}
.task-actions{display:flex;gap:4px;flex-shrink:0}
.act-btn{font-size:9px;padding:3px 6px;border-radius:6px;border:0.5px solid #e0e0d8;background:#f9f9f6;color:#555;cursor:pointer;white-space:nowrap}
.act-btn.rain{background:#EBF5FB;color:#1A5276;border-color:#AED6F1}
.act-btn.delay{background:#F9F9F9;color:#555}
.type-badge{font-size:9px;padding:2px 5px;border-radius:5px;white-space:nowrap;flex-shrink:0}
.tb-r{background:#D6EAF8;color:#0C447C}
.tb-a{background:#EAF3DE;color:#27500A}
.tb-t{background:#FADBD8;color:#712B13}
.tb-v{background:#F1EFE8;color:#5F5E5A}
.tb-h{background:#FAEEDA;color:#633806}

/* ── SUMMARY BAR ── */
.summary-bar{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin:8px 12px}
.stat-card{background:#fff;border-radius:8px;border:0.5px solid #e0e0d8;padding:8px 6px;text-align:center}
.stat-n{font-size:18px;font-weight:600;color:#2D5016}
.stat-l{font-size:9px;color:#888;margin-top:1px}

/* ── PILLS ── */
.pill-row{display:flex;gap:6px;flex-wrap:wrap;padding:8px 12px 4px}
.pill{font-size:10px;padding:3px 9px;border-radius:10px;font-weight:500}
.p-b{background:#D6EAF8;color:#0C447C}
.p-g{background:#EAF3DE;color:#27500A}
.p-r{background:#FADBD8;color:#712B13}
.p-a{background:#FAEEDA;color:#633806}
.p-sky{background:#EBF5FB;color:#1A5276}

/* ── ALERT ── */
.alert-bar{background:#FFF3CD;margin:4px 12px 4px;border-radius:8px;padding:7px 10px;font-size:11px;color:#633806;border:0.5px solid #F9C74F;display:flex;gap:6px;align-items:flex-start}

/* ── SECTION LABEL ── */
.sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#888;padding:8px 14px 3px}

/* ── HISTORIAL ── */
.hist-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:0.5px solid #f0f0e8;background:#fff}
.hist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hist-info{flex:1}
.hist-name{font-size:12px;font-weight:500;color:#2D5016}
.hist-task{font-size:11px;color:#555}
.hist-date{font-size:10px;color:#aaa;text-align:right;flex-shrink:0}

/* ── FORMS ── */
.form-wrap{padding:12px}
.form-card{background:#fff;border-radius:12px;border:0.5px solid #e0e0d8;padding:14px}
.form-title{font-size:13px;font-weight:600;color:#2D5016;margin-bottom:12px}
.frow{margin-bottom:10px}
.frow-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.flbl{font-size:10px;color:#888;margin-bottom:3px;display:block}
.finput,.fsel{width:100%;padding:8px 10px;font-size:12px;border-radius:8px;border:0.5px solid #ddd;background:#f9f9f6;color:#1a1a1a;-webkit-appearance:none;appearance:none}
.finput:focus,.fsel:focus{outline:none;border-color:#639922;background:#fff}
.radio-row{display:flex;gap:12px;margin-top:4px}
.radio-row label{display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer}

/* ── CALC BOX ── */
.calc-box{background:#EAF3DE;border-radius:8px;padding:10px 12px;margin:10px 0;border:0.5px solid #C0DD97}
.calc-title{font-size:10px;color:#27500A;font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.calc-row{font-size:11px;color:#3B6D11;margin-bottom:3px;line-height:1.4}
.calc-row:last-child{margin-bottom:0}

/* ── COMPAT BOX ── */
.compat-box{border-radius:8px;padding:8px 10px;margin:8px 0;font-size:10px}
.compat-ok{background:#EAF3DE;color:#27500A;border:0.5px solid #C0DD97}
.compat-no{background:#FADBD8;color:#712B13;border:0.5px solid #F5C4B3}

/* ── SAVE BTN ── */
.save-btn{width:100%;padding:12px;background:#2D5016;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px}
.save-btn:active{opacity:.85}
.sec-btn{width:100%;padding:10px;background:#f4f6f0;color:#2D5016;border:0.5px solid #C0DD97;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;margin-top:8px}

/* ── MODAL ── */
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#fff;border-radius:20px 20px 0 0;width:100%;padding:16px 16px calc(16px + env(safe-area-inset-bottom,0px));max-height:85vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-title{font-size:14px;font-weight:600;color:#2D5016}
.modal-close{font-size:20px;color:#aaa;cursor:pointer;line-height:1;background:none;border:none;padding:0}
.detail-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid #f0f0e8;font-size:12px}
.detail-row:last-child{border-bottom:none}
.detail-lbl{color:#888;flex-shrink:0;margin-right:8px}
.detail-val{color:#1a1a1a;font-weight:500;text-align:right}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-btns button{flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none}
.mbtn-sec{background:#f4f4ee;color:#555}
.mbtn-pri{background:#2D5016;color:#fff}
.mbtn-rain{background:#EBF5FB;color:#1A5276}
.mbtn-del{background:#FADBD8;color:#712B13}

/* ── LOADING ── */
#loading{position:absolute;inset:0;background:#f4f6f0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:200}
#loading .logo{font-size:48px}
#loading p{font-size:13px;color:#639922}
#loading.hidden{display:none}

/* ── SYNC INDICATOR ── */
.sync-dot{width:8px;height:8px;border-radius:50%;background:#9FE1CB;flex-shrink:0}
.sync-dot.syncing{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-dot.error{background:#F5C4B3}

/* ── FAB ── */
.fab{position:absolute;bottom:80px;right:16px;width:44px;height:44px;border-radius:50%;background:#639922;border:none;color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(45,80,22,.3);z-index:10}
.fab:active{transform:scale(.95)}

/* ── TOAST ── */
#toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;opacity:0;transition:all .25s;z-index:300;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── AJUSTES ── */
.settings-card{background:#fff;margin:0 12px 10px;border-radius:12px;border:0.5px solid #e0e0d8;overflow:hidden}
.settings-hdr{padding:8px 14px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#888;background:#f9f9f6;border-bottom:0.5px solid #f0f0e8}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:0.5px solid #f0f0e8}
.settings-row:last-child{border-bottom:none}
.settings-lbl{font-size:13px;color:#1a1a1a}
.settings-sub{font-size:10px;color:#888;margin-top:1px}
.toggle{width:42px;height:24px;border-radius:12px;background:#ddd;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
.toggle.on{background:#639922}
.toggle-knob{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s}
.toggle.on .toggle-knob{left:20px}
.settings-select{padding:5px 8px;font-size:12px;border-radius:7px;border:0.5px solid #ddd;background:#f9f9f6;color:#1a1a1a}
.conn-ok{font-size:11px;color:#639922;font-weight:500}
.conn-err{font-size:11px;color:#D85A30;font-weight:500}
.link-btn{font-size:12px;color:#185FA5;background:none;border:none;cursor:pointer;padding:0}
</style>
</head>
<body>
<div id="app">

  <div id="loading">
    <div class="logo">🌳</div>
    <p>Cargando frutales…</p>
  </div>

  <div id="topbar">
    <div>
      <div class="title" id="topbar-title">Cargando…</div>
      <div class="sub" id="topbar-sub"></div>
    </div>
    <div id="topbar-actions">
      <div class="sync-dot" id="sync-dot" title="Estado de sincronización"></div>
    </div>
  </div>

  <div id="content"></div>

  <div id="tabbar">
    <div class="tab-item active" id="tab-hoy" onclick="showTab('hoy')">
      <span class="tab-icon">📅</span>
      <span class="tab-label">Hoy</span>
    </div>
    <div class="tab-item" id="tab-arboles" onclick="showTab('arboles')">
      <span class="tab-icon">🌳</span>
      <span class="tab-label">Árboles</span>
    </div>
    <div class="tab-item" id="tab-historial" onclick="showTab('historial')">
      <span class="tab-icon">📋</span>
      <span class="tab-label">Historial</span>
    </div>
    <div class="tab-item" id="tab-ajustes" onclick="showTab('ajustes')">
      <span class="tab-icon">⚙️</span>
      <span class="tab-label">Ajustes</span>
    </div>
  </div>

  <div id="modal-container"></div>
  <div id="toast"></div>
</div>

<script>
// ── CONFIGURACIÓN ────────────────────────────────────────────
// ¡IMPORTANTE! Sustituye esta URL por la de tu Web App de Apps Script
const API_URL = localStorage.getItem('api_url') || '';

// ── ESTADO GLOBAL ────────────────────────────────────────────
const STATE = {
  tab: 'hoy',
  arboles: [],
  tareas: [],
  historial: [],
  config: { garrafa_litros: 13, notif_riego: true, notif_hora: '08:00', notif_finde: true },
  loading: false,
  syncing: false,
  offline: false,
  longPressTimer: null,
};

// ── CACHE LOCAL (offline) ─────────────────────────────────────
const CACHE = {
  set(key, val) { try { localStorage.setItem('frutales_' + key, JSON.stringify(val)); } catch(e){} },
  get(key, def) { try { const v = localStorage.getItem('frutales_' + key); return v ? JSON.parse(v) : def; } catch(e){ return def; } },
};

// ── UTILIDADES ───────────────────────────────────────────────
function fmtFecha(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-ES', { weekday:'short', day:'numeric', month:'short' });
}
function fmtHora(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
}
function hoy() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function estaDisemana(iso) {
  const d = new Date(iso);
  const h = hoy();
  const lunes = new Date(h); lunes.setDate(h.getDate() - ((h.getDay()+6)%7));
  const domingo = new Date(lunes); domingo.setDate(lunes.getDate() + 6); domingo.setHours(23,59,59,999);
  return d >= lunes && d <= domingo;
}
function getEstacion() {
  const m = new Date().getMonth() + 1;
  if (m >= 3 && m <= 5)  return 'Primavera';
  if (m >= 6 && m <= 9)  return 'Verano';
  if (m >= 10 && m <= 11) return 'Otoño';
  return 'Invierno';
}
function formatGarrafa(litros) {
  const g = Number(STATE.config.garrafa_litros) || 13;
  const frac = litros / g;
  let fracStr;
  if (frac <= 0.15)      fracStr = '⅛';
  else if (frac <= 0.3)  fracStr = '¼';
  else if (frac <= 0.45) fracStr = '⅓';
  else if (frac <= 0.6)  fracStr = '½';
  else if (frac <= 0.75) fracStr = '⅔';
  else if (frac <= 0.9)  fracStr = '¾';
  else if (frac <= 1.1)  fracStr = '1';
  else if (frac <= 1.6)  fracStr = '1½';
  else if (frac <= 2.1)  fracStr = '2';
  else fracStr = (Math.round(frac * 10) / 10).toString();
  return `${litros} L ≈ ${fracStr} garrafa ${g}L`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function setSyncState(state) {
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
}

// ── API ──────────────────────────────────────────────────────
async function api(action, params = {}) {
  if (!API_URL) {
    STATE.offline = true;
    return getCachedData(action);
  }
  setSyncState('syncing');
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, ...params })
    });
    const data = await res.json();
    setSyncState('ok');
    STATE.offline = false;
    if (data.ok) CACHE.set(action + JSON.stringify(params), data);
    return data;
  } catch (e) {
    setSyncState('error');
    STATE.offline = true;
    return getCachedData(action, params);
  }
}

function getCachedData(action, params = {}) {
  return CACHE.get(action + JSON.stringify(params), { ok: false, error: 'Sin conexión' });
}

// ── INIT ─────────────────────────────────────────────────────
async function init() {
  document.getElementById('loading').classList.remove('hidden');
  // Cargar config
  const cfg = await api('getConfig');
  if (cfg.ok) {
    STATE.config = cfg.config;
    CACHE.set('config', cfg.config);
  } else {
    STATE.config = CACHE.get('config', { garrafa_litros: 13 });
  }
  // Cargar árboles
  const arb = await api('getArboles');
  if (arb.ok) { STATE.arboles = arb.arboles; CACHE.set('arboles', arb.arboles); }
  else STATE.arboles = CACHE.get('arboles', []);
  // Cargar tareas semana
  const tar = await api('getTareas', {});
  if (tar.ok) { STATE.tareas = tar.tareas; CACHE.set('tareas', tar.tareas); }
  else STATE.tareas = CACHE.get('tareas', []);

  document.getElementById('loading').classList.add('hidden');
  showTab('hoy');
}

// ── TABS ─────────────────────────────────────────────────────
function showTab(tab) {
  STATE.tab = tab;
  document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('tab-' + tab);
  if (el) el.classList.add('active');
  const renders = { hoy: renderHoy, arboles: renderArboles, historial: renderHistorial, ajustes: renderAjustes };
  if (renders[tab]) renders[tab]();
}

// ── PANTALLA: HOY ─────────────────────────────────────────────
function renderHoy() {
  const now = new Date();
  const diasES = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const mesesES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('topbar-title').textContent = `${diasES[now.getDay()]} ${now.getDate()} ${mesesES[now.getMonth()]}`;

  const semana = getSemanaISO(now);
  document.getElementById('topbar-sub').textContent = `Sem ${semana} · ${getEstacion()}`;

  const tareasSemana = STATE.tareas.filter(t => estaDisemana(t.fecha_prevista));
  const pendientes = tareasSemana.filter(t => t.estado === 'pendiente').length;
  const hechas = tareasSemana.filter(t => t.estado === 'hecha').length;
  const saltadas = tareasSemana.filter(t => t.estado === 'saltada').length;

  const riegoC   = tareasSemana.filter(t => t.tipo === 'riego').length;
  const abonoC   = tareasSemana.filter(t => t.tipo === 'abono' || t.tipo === 'humus').length;
  const tratC    = tareasSemana.filter(t => t.tipo === 'tratamiento').length;
  const lluviaC  = tareasSemana.filter(t => t.saltada_lluvia).length;

  // Agrupar tareas semana por árbol
  const porArbol = {};
  tareasSemana.forEach(t => {
    if (!porArbol[t.arbol_id]) porArbol[t.arbol_id] = [];
    porArbol[t.arbol_id].push(t);
  });

  // Alertas (melocotonero, árboles con tratamiento activo)
  const alertas = [];
  STATE.arboles.forEach(a => {
    const tratActivo = tareasSemana.find(t => t.arbol_id === a.id && t.tipo === 'tratamiento' && t.estado === 'pendiente');
    if (tratActivo) alertas.push(`${a.emoji} ${a.nombre} — tratamiento pendiente esta semana`);
  });

  let html = '';

  // Pills resumen semana
  html += `<div class="pill-row">`;
  if (riegoC)  html += `<span class="pill p-b">💧 ${riegoC} riego${riegoC>1?'s':''}</span>`;
  if (abonoC)  html += `<span class="pill p-g">🌱 ${abonoC} abono${abonoC>1?'s':''}</span>`;
  if (tratC)   html += `<span class="pill p-r">⚗️ ${tratC} trat.</span>`;
  if (lluviaC) html += `<span class="pill p-sky">☁️ ${lluviaC} saltado${lluviaC>1?'s':''}</span>`;
  html += `</div>`;

  // Alertas
  alertas.forEach(a => {
    html += `<div class="alert-bar"><span>⚠️</span><span>${a}</span></div>`;
  });

  if (STATE.offline) {
    html += `<div class="alert-bar" style="background:#FEF9E7;border-color:#F9C74F"><span>📵</span><span>Sin conexión — mostrando datos en caché</span></div>`;
  }

  // Sección por árbol
  const arbolMap = {};
  STATE.arboles.forEach(a => arbolMap[a.id] = a);

  Object.entries(porArbol).forEach(([arbol_id, tareas]) => {
    const arbol = arbolMap[arbol_id];
    if (!arbol) return;
    const total = tareas.length;
    const done = tareas.filter(t => t.estado === 'hecha').length;
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    const tieneAlerta = tareas.some(t => t.tipo === 'tratamiento' && t.estado === 'pendiente');

    html += `<div class="card">
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      <div class="card-header">
        <span class="card-emoji">${arbol.emoji||'🌳'}</span>
        <span class="card-name">${arbol.nombre}</span>
        ${tieneAlerta ? `<span class="card-badge alert">⚠️ trat.</span>` : `<span class="card-badge">${arbol.tipo||''}</span>`}
        <span class="card-progress-txt">${done}/${total}</span>
      </div>
      <div class="card-body">`;

    tareas.forEach(t => {
      const isDone = t.estado === 'hecha';
      const isSkip = t.estado === 'saltada';
      const tipoBadge = { riego:'tb-r', abono:'tb-a', humus:'tb-h', tratamiento:'tb-t', revision:'tb-v' }[t.tipo] || 'tb-v';
      const tipoLabel = { riego:'💧 riego', abono:'🌱 abono', humus:'🪱 humus', tratamiento:'⚗️ trat.', revision:'🔍 rev.' }[t.tipo] || t.tipo;

      let subInfo = '';
      if (t.tipo === 'riego' && t.cantidad) subInfo = formatGarrafa(Number(t.cantidad));
      else if (t.fecha_prevista) subInfo = fmtFecha(t.fecha_prevista);

      html += `<div class="task-row"
        onclick="toggleTarea('${t.id}')"
        ontouchstart="startLongPress(event,'${t.id}')"
        ontouchend="cancelLongPress()"
        ontouchmove="cancelLongPress()"
        onmousedown="startLongPress(event,'${t.id}')"
        onmouseup="cancelLongPress()"
        onmouseleave="cancelLongPress()"
      >
        <div class="chk ${isDone||isSkip?'done':''}" onclick="event.stopPropagation();toggleTarea('${t.id}')">
          <span class="chk-tick">${isSkip?'☁':'✓'}</span>
        </div>
        <div class="task-info">
          <div class="task-name ${isDone||isSkip?'done':''}">${t.descripcion||''}</div>
          ${subInfo ? `<div class="task-sub">${subInfo}</div>` : ''}
        </div>
        <div class="task-actions">
          <span class="type-badge ${tipoBadge}">${tipoLabel}</span>
          ${!isDone && !isSkip ? `
            <span class="act-btn rain" onclick="event.stopPropagation();skipTarea('${t.id}')">☁️</span>
            <span class="act-btn delay" onclick="event.stopPropagation();aplazarModal('${t.id}')">📅</span>
          ` : ''}
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  if (Object.keys(porArbol).length === 0) {
    html += `<div style="text-align:center;padding:40px 20px;color:#888;font-size:13px">
      <div style="font-size:40px;margin-bottom:12px">🌱</div>
      No hay tareas esta semana.<br>Comprueba la conexión o añade árboles.
    </div>`;
  }

  document.getElementById('content').innerHTML = html;
}

        <div class="hist-date">${fmtHora(h.timestamp)}</div>

// ── ACCIONES TAREAS ──────────────────────────────────────────
async function toggleTarea(id) {
  const t = STATE.tareas.find(x => x.id === id);
  if (!t) return;
  if (t.estado === 'hecha') return;
  t.estado = 'hecha';
  renderHoy();
  const res = await api('checkTarea', { id });
  if (!res.ok) { t.estado = 'pendiente'; renderHoy(); showToast('Error al guardar'); }
  else showToast('✓ Tarea marcada');
  CACHE.set('tareas', STATE.tareas);
}

async function skipTarea(id) {
  const t = STATE.tareas.find(x => x.id === id);
  if (!t) return;
  t.estado = 'saltada'; t.saltada_lluvia = true;
  renderHoy();
  const res = await api('skipTarea', { id });
  if (!res.ok) { t.estado = 'pendiente'; t.saltada_lluvia = false; renderHoy(); showToast('Error al guardar'); }
  else showToast('☁️ Saltada por lluvia');
  CACHE.set('tareas', STATE.tareas);
}

function aplazarModal(id) {
  const t = STATE.tareas.find(x => x.id === id);
  if (!t) return;
  const mañana = new Date(); mañana.setDate(mañana.getDate() + 1);
  const fmtVal = mañana.toISOString().split('T')[0];
  showModal(`
    <div class="modal-hdr"><span class="modal-title">📅 Aplazar tarea</span><button class="modal-close" onclick="closeModal()">×</button></div>
    <div style="font-size:12px;color:#555;margin-bottom:12px">${t.descripcion}</div>
    <div class="frow"><label class="flbl">Nueva fecha</label><input type="date" class="finput" id="nueva-fecha" value="${fmtVal}" min="${fmtVal}"></div>
    <div class="modal-btns">
      <button class="mbtn-sec" onclick="closeModal()">Cancelar</button>
      <button class="mbtn-pri" onclick="confirmarAplazar('${id}')">Aplazar</button>
    </div>
  `);
}

async function confirmarAplazar(id) {
  const nf = document.getElementById('nueva-fecha').value;
  if (!nf) return;
  closeModal();
  const t = STATE.tareas.find(x => x.id === id);
  if (t) { t.fecha_prevista = nf + 'T08:00:00.000Z'; t.estado = 'aplazada'; }
  renderHoy();
  await api('aplazarTarea', { id, nueva_fecha: nf });
  showToast('📅 Tarea aplazada');
  CACHE.set('tareas', STATE.tareas);
}

function recalcArbol() {
  const tipo   = document.getElementById('na-tipo')?.value || 'citrico';
  const edad   = Number(document.getElementById('na-edad')?.value) || 1;
  const suelo  = document.getElementById('na-suelo')?.value || 'franco';
  const g = Number(STATE.config.garrafa_litros) || 13;
  const estacion = getEstacion().toLowerCase().substring(0,4);
  const eKey = { prim:'prim', vera:'ver', otoñ:'oto', otono:'oto', invi:'inv' }[estacion.substring(0,4)] || 'prim';

  // Calcular localmente (replica lógica del servidor)
  let base = { prim:[1.5,2], ver:[2,3], oto:[1.5,1], inv:[1,0.5] };
  if (tipo === 'citrico') {
    if (edad >= 4) base = { prim:[2.5,2], ver:[3,3], oto:[2,1], inv:[1.5,0.4] };
    else           base = { prim:[1.5,2], ver:[2,3], oto:[1.5,1], inv:[1,0.5] };
  } else if (tipo === 'tropical') {
    base = { prim:[1.5,2], ver:[2,3], oto:[1,1], inv:[0.5,0.5] };
  } else if (tipo === 'hueso') {
    base = { prim:[2,2], ver:[2.5,3], oto:[1.5,1], inv:[1,0.5] };
  } else if (tipo === 'manzano') {
    if (edad >= 3) base = { prim:[2,2], ver:[2.5,3], oto:[1.5,1], inv:[1,0.5] };
    else           base = { prim:[1.5,2], ver:[2,3], oto:[1,1], inv:[1,0.5] };
  }
  const factor = suelo === 'arcilloso' ? 0.85 : suelo === 'arenoso' ? 1.1 : 1;
  const estKeys = ['prim','ver','oto','inv'];
  const m = new Date().getMonth() + 1;
  const ek = m>=3&&m<=5?'prim':m>=6&&m<=9?'ver':m>=10&&m<=11?'oto':'inv';
  const litros = Math.round(base[ek][0] * factor * 10) / 10;
  const frec   = base[ek][1];
  const garrStr = (() => {
    const frac = litros / g;
    if (frac <= 0.15) return '⅛';
    if (frac <= 0.3)  return '¼';
    if (frac <= 0.45) return '⅓';
    if (frac <= 0.6)  return '½';
    if (frac <= 0.75) return '⅔';
    if (frac <= 0.9)  return '¾';
    if (frac <= 1.1)  return '1';
    if (frac <= 1.6)  return '1½';
    return '2';
  })();

  const abonoTxt = {
    citrico: `🌱 Abono cítricos: ${edad>=4?'70':'35'} g · cada 5–6 sem.\n🪱 Humus lombriz: ${edad>=4?'2':'1'} kg · primavera`,
    tropical: '🌱 Abono universal: 25 g · cada 5–6 sem.\n🪱 Humus lombriz: 1 kg · primavera',
    hueso: '🌱 Abono frutales: 55–65 g · 2 veces (may+jun)\n🪱 Humus lombriz: 2 kg · primavera',
    manzano: `🌱 Abono frutales: ${edad>=2?'55':'45'} g · 2 veces (may+jun)\n🪱 Humus lombriz: 1 kg · primavera`,
  }[tipo] || '';

  const el = document.getElementById('na-calc-content');
  if (el) el.innerHTML = `
    💧 Riego: ${litros} L ≈ ${garrStr} garrafa ${g}L · ${frec}×/semana<br>
    ${abonoTxt.replace(/\n/g,'<br>')}
  `;
}

async function guardarNuevaPlanta() {
  const tipo    = document.getElementById('na-tipo')?.value;
  const especie = document.getElementById('na-especie')?.value || tipo;
  const edad    = document.getElementById('na-edad')?.value || '1';
  const suelo   = document.getElementById('na-suelo')?.value || 'franco';
  const nombre  = document.getElementById('na-nombre')?.value || especie;
  const fruto   = document.querySelector('input[name="na-fruto"]:checked')?.value || 'false';
  const abonado = document.querySelector('input[name="na-abonado"]:checked')?.value || 'false';

  closeModal();
  showToast('Añadiendo árbol…');

  const res = await api('addArbol', { tipo, especie, edad_anos: edad, suelo, nombre, ha_dado_fruto: fruto, abonado_este_mes: abonado });
  if (res.ok) {
    // Recargar árboles y tareas
    const arb = await api('getArboles');
    if (arb.ok) { STATE.arboles = arb.arboles; CACHE.set('arboles', arb.arboles); }
    const tar = await api('getTareas', {});
    if (tar.ok) { STATE.tareas = tar.tareas; CACHE.set('tareas', tar.tareas); }
    showToast('🌱 Árbol añadido');
    renderArboles();
  } else {
    showToast('Error al añadir árbol');
  }
}

// ── MODAL EDITAR ÁRBOL ────────────────────────────────────────

  if (!a) return;
  showModal(`
    <div class="modal-hdr"><span class="modal-title">${a.emoji||'🌳'} ${a.nombre}</span><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="frow"><label class="flbl">Nombre</label><input class="finput" id="ea-nombre" value="${a.nombre}"></div>
    <div class="frow-2">
      <div class="frow" style="margin:0"><label class="flbl">Edad (años)</label><input class="finput" type="number" id="ea-edad" value="${a.edad_años||1}" min="0" max="50"></div>
      <div class="frow" style="margin:0"><label class="flbl">Tipo de suelo</label>
        <select class="fsel" id="ea-suelo">
          <option value="franco" ${a.suelo==='franco'?'selected':''}>Franco</option>
          <option value="arcilloso" ${a.suelo==='arcilloso'?'selected':''}>Arcilloso</option>
          <option value="arenoso" ${a.suelo==='arenoso'?'selected':''}>Arenoso</option>
        </select>
      </div>
    </div>
    <div class="frow-2" style="margin-top:8px">
      <div><label class="flbl">¿Ha dado fruto?</label>
        <div class="radio-row">
          <label><input type="radio" name="ea-fruto" value="true" ${a.ha_dado_fruto?'checked':''}> Sí</label>
          <label><input type="radio" name="ea-fruto" value="false" ${!a.ha_dado_fruto?'checked':''}> No</label>
        </div>
      </div>
      <div><label class="flbl">¿Abonado este mes?</label>
        <div class="radio-row">
          <label><input type="radio" name="ea-abonado" value="true" ${a.abonado_este_mes?'checked':''}> Sí</label>
          <label><input type="radio" name="ea-abonado" value="false" ${!a.abonado_este_mes?'checked':''}> No</label>
        </div>

    <div class="modal-btns">
      <button class="mbtn-del" onclick="confirmarEliminar('${id}')">Eliminar</button>
      <button class="mbtn-sec" onclick="addTratamientoModal('${id}')">+ Trat.</button>
      <button class="mbtn-pri" onclick="guardarEditArbol('${id}')">Guardar</button>
    </div>

}

async function guardarEditArbol(id) {
  const nombre  = document.getElementById('ea-nombre')?.value;
  const edad    = document.getElementById('ea-edad')?.value;
  const suelo   = document.getElementById('ea-suelo')?.value;
  const fruto   = document.querySelector('input[name="ea-fruto"]:checked')?.value;
  const abonado = document.querySelector('input[name="ea-abonado"]:checked')?.value;
  closeModal();
  const res = await api('editArbol', { id, nombre, edad_anos: edad, suelo, ha_dado_fruto: fruto, abonado_este_mes: abonado });
  if (res.ok) {
    const arb = await api('getArboles');
    if (arb.ok) { STATE.arboles = arb.arboles; CACHE.set('arboles', arb.arboles); }
    showToast('✓ Árbol actualizado');
    renderArboles();
  } else showToast('Error al guardar');
}

function confirmarEliminar(id) {
  const a = STATE.arboles.find(x => x.id === id);
  if (!confirm(`¿Eliminar ${a ? a.nombre : 'árbol'}? Esta acción no se puede deshacer.`)) return;
  closeModal();
  api('deleteArbol', { id }).then(res => {
    if (res.ok) {
      STATE.arboles = STATE.arboles.filter(x => x.id !== id);
      CACHE.set('arboles', STATE.arboles);
      showToast('🗑 Árbol eliminado');
      renderArboles();
    }
  });
}

// ── MODAL NUEVO TRATAMIENTO ───────────────────────────────────
function addTratamientoModal(arbol_id) {
  const a = STATE.arboles.find(x => x.id === arbol_id);
  const hoy_str = new Date().toISOString().split('T')[0];
  closeModal();
  showModal(`
    <div class="modal-hdr"><span class="modal-title">⚗️ Nuevo tratamiento${a?' — '+a.nombre:''}</span><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="frow">
      <label class="flbl">Tipo de tratamiento</label>
      <select class="fsel" id="nt-tipo" onchange="updateCompatInfo()">
        <option value="fungicida">Fungicida (cobre / oxicloruro)</option>
        <option value="insecticida">Insecticida</option>
        <option value="hierro">Hierro quelado</option>
        <option value="acaricida">Acaricida</option>
        <option value="otro">Otro</option>
      </select>
    </div>
    <div class="frow"><label class="flbl">Producto</label><input class="finput" id="nt-producto" placeholder="ej. Oxicloruro de cobre 50%"></div>
    <div class="frow-2">
      <div class="frow" style="margin:0"><label class="flbl">Cantidad</label><input class="finput" type="number" id="nt-cantidad" placeholder="ej. 15" min="0"></div>
      <div class="frow" style="margin:0"><label class="flbl">Unidad</label>
        <select class="fsel" id="nt-unidad">
          <option value="g/L agua">g/L agua</option>
          <option value="ml/L agua">ml/L agua</option>
          <option value="g directos">g directos</option>
          <option value="ml directos">ml directos</option>
        </select>
      </div>
    </div>
    <div class="frow">
      <label class="flbl">Modo de aplicación</label>
      <select class="fsel" id="nt-modo">
        <option value="Pulverizar hojas y ramas">Pulverizar hojas y ramas</option>
        <option value="Disolver en agua y regar">Disolver en agua y regar</option>
        <option value="Esparcir sobre tierra">Esparcir sobre tierra</option>
      </select>
    </div>
    <div class="frow-2">
      <div class="frow" style="margin:0"><label class="flbl">Núm. aplicaciones</label><input class="finput" type="number" id="nt-num" value="3" min="1" max="20" oninput="updatePreview()"></div>
      <div class="frow" style="margin:0"><label class="flbl">Cada (días)</label><input class="finput" type="number" id="nt-frec" value="14" min="1" max="90" oninput="updatePreview()"></div>
    </div>
    <div class="frow"><label class="flbl">Primera aplicación</label><input class="finput" type="date" id="nt-fecha" value="${hoy_str}" oninput="updatePreview()"></div>
    <div id="nt-compat"></div>
    <div id="nt-preview" style="font-size:10px;color:#888;margin:4px 0 8px;line-height:1.5"></div>
    <button class="save-btn" onclick="guardarTratamiento('${arbol_id}')">Añadir al calendario</button>
  `);
  updateCompatInfo();
  updatePreview();
}

function updateCompatInfo() {
  const tipo = document.getElementById('nt-tipo')?.value;
  const msgs = {
    fungicida: { no:'No aplicar junto con abono foliar. Esperar 3 días tras riego.' },
    insecticida: { no:'No mezclar con fungicidas cúpricos. Evitar altas temperaturas.' },
    hierro: { ok:'Compatible con riego el mismo día.', no:'No mezclar con cal o productos básicos.' },
    acaricida: { no:'No aplicar bajo sol directo. Esperar 48 h antes de regar.' },
    otro: {}
  };
  const m = msgs[tipo] || {};
  let html = '';
  if (m.ok) html += `<div class="compat-box compat-ok">✓ ${m.ok}</div>`;
  if (m.no) html += `<div class="compat-box compat-no">✗ ${m.no}</div>`;
  const el = document.getElementById('nt-compat');
  if (el) el.innerHTML = html;
}

function updatePreview() {
  const num  = Number(document.getElementById('nt-num')?.value) || 1;
  const frec = Number(document.getElementById('nt-frec')?.value) || 14;
  const fechaStr = document.getElementById('nt-fecha')?.value;
  if (!fechaStr) return;
  const fechas = [];
  let f = new Date(fechaStr + 'T12:00:00');
  for (let i = 0; i < num && i < 5; i++) {
    while (f.getDay() !== 6 && f.getDay() !== 0) f.setDate(f.getDate() + 1);
    fechas.push(f.toLocaleDateString('es-ES', { day:'numeric', month:'short' }));
    f = new Date(f); f.setDate(f.getDate() + frec);
  }
  const el = document.getElementById('nt-preview');
  if (el) el.innerHTML = `📅 Se añadirán ${num} tarea${num>1?'s':''} en fines de semana: <strong>${fechas.join(' · ')}</strong>${num>5?' …':''}`;
}

async function guardarTratamiento(arbol_id) {
  const tipo     = document.getElementById('nt-tipo')?.value;
  const producto = document.getElementById('nt-producto')?.value || tipo;
  const cantidad = document.getElementById('nt-cantidad')?.value || '0';
  const unidad   = document.getElementById('nt-unidad')?.value;
  const modo     = document.getElementById('nt-modo')?.value;
  const num      = document.getElementById('nt-num')?.value || '1';
  const frec     = document.getElementById('nt-frec')?.value || '14';
  const fecha    = document.getElementById('nt-fecha')?.value;
  if (!fecha) { showToast('Indica una fecha'); return; }
  closeModal();
  showToast('Añadiendo tratamiento…');
  const res = await api('addTratamiento', { arbol_id, tipo, producto, cantidad, unidad, modo_aplicacion: modo, num_aplicaciones: num, frecuencia_dias: frec, fecha_inicio: fecha });
  if (res.ok) {
    const tar = await api('getTareas', {});
    if (tar.ok) { STATE.tareas = tar.tareas; CACHE.set('tareas', tar.tareas); }
    showToast('⚗️ Tratamiento añadido');
    renderHoy();
  } else showToast('Error al añadir tratamiento');
}

// ── AJUSTES ACCIONES ─────────────────────────────────────────
async function saveGarrafa(val) {
  if (val === 'custom') return;
  const v = Number(val);
  if (!v || v < 1) return;
  STATE.config.garrafa_litros = v;
  CACHE.set('config', STATE.config);
  await api('setConfig', { clave: 'garrafa_litros', valor: v });
  showToast(`Garrafa: ${v} L`);
  renderAjustes();
}

async function toggleNotif(clave) {
  STATE.config[clave] = !STATE.config[clave];
  CACHE.set('config', STATE.config);
  await api('setConfig', { clave, valor: STATE.config[clave] });
  renderAjustes();
}

function setApiUrl() {
  const url = prompt('Pega la URL de tu Web App de Apps Script:', API_URL);
  if (url && url.startsWith('https://')) {
    localStorage.setItem('api_url', url);
    showToast('URL guardada. Recargando…');
    setTimeout(() => location.reload(), 1000);
  }
}

function copyLink() {
  navigator.clipboard.writeText(location.href).then(() => showToast('🔗 Enlace copiado'));
}

// ── MODAL GENÉRICO ────────────────────────────────────────────
function showModal(html) {
  const c = document.getElementById('modal-container');
  c.innerHTML = `<div class="modal-overlay" onclick="closeModalOverlay(event)"><div class="modal-box">${html}</div></div>`;
}
function closeModal() { document.getElementById('modal-container').innerHTML = ''; }
function closeModalOverlay(e) { if (e.target.classList.contains('modal-overlay')) closeModal(); }

// ── HELPERS ──────────────────────────────────────────────────
function getSemanaISO(d) {
  const tmp = new Date(d.getTime());
  tmp.setHours(0,0,0,0);
  tmp.setDate(tmp.getDate() + 3 - (tmp.getDay() + 6) % 7);
  const y = new Date(tmp.getFullYear(), 0, 4);
  return 1 + Math.round(((tmp.getTime() - y.getTime()) / 86400000 - 3 + (y.getDay() + 6) % 7) / 7);
}

// ── SERVICE WORKER ────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── ARRANQUE ─────────────────────────────────────────────────
window.addEventListener('load', init);
</script>
